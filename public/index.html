<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiro App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: 80px auto;
      padding: 0 16px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 32px;
      color: #1a1a1a;
    }

    .form {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #4f46e5;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #4338ca;
    }

    #greeting {
      margin-top: 32px;
      font-size: 1.5rem;
      color: #4f46e5;
      min-height: 2rem;
    }

    /* Visually hidden but accessible to screen readers */
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1 data-testid="main-heading">Welcome to Kiro App</h1>

    <div class="form">
      <label for="name-input" class="visually-hidden">Your name</label>
      <input type="text" id="name-input" data-testid="name-input" placeholder="Enter your name" aria-label="Your name" />
      <button id="submit-btn" data-testid="submit-btn">Submit</button>
    </div>

    <p id="greeting-output" data-testid="greeting-output" aria-live="polite"></p>
  </main>

  <script>
    const submitBtn = document.getElementById('submit-btn');
    const nameInput = document.getElementById('name-input');
    const greeting = document.getElementById('greeting-output');

    submitBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      greeting.textContent = name ? `Hello, ${name}!` : '';
    });

    // Also trigger on Enter key
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitBtn.click();
    });
  </script>
</body>
</html>
